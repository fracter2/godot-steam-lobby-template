[plugin]

name="MultiplayerSpawnManagers"
description="Adds ServerSpawnManager, ClientSpawnManager, and LocalSpawnManager nodes. They are \"semi-singletons\", providing convenience static spawn methods, when placed in the scene. They only allow valid spawns, and use a Spawnlist resource. Overall, this is a relatively opinionated and strict approach to providing spawn logic and authority checks."
author="fracter"
version="1.0.0"
script="plugin.gd"
